{% extends 'fir_app/base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'fir_app/css/auth.css' %}">

<div class="card auth-card p-4 text-center">
    <h3 class="mb-3">Check Your Inbox</h3>
    <p class="text-muted mb-4">
        We've emailed you instructions for setting your password. You should receive them shortly.
    </p>
    <p class="text-muted small">
        If you don't receive an email, please make sure you've entered the address you registered with.
    </p>
</div>
{% endblock %}
