{% extends 'fir_app/base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'fir_app/css/auth.css' %}">

<div class="card auth-card p-4">
    <h3 class="text-center mb-3">Reset Password</h3>
    <p class="text-muted text-center mb-4">Enter your email address below, and we'll email instructions for setting a new one.</p>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary w-100">Send Reset Email</button>
    </form>
    
    <div class="text-center mt-3 pt-3 border-top">
        <a href="{% url 'login' %}" class="text-decoration-none text-muted">
            <small>Back to Login</small>
        </a>
    </div>
</div>
{% endblock %}
