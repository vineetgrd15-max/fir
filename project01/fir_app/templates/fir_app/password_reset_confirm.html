{% extends 'fir_app/base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'fir_app/css/auth.css' %}">

<div class="card auth-card p-4">
    <h3 class="text-center mb-4">Set New Password</h3>
    
    {% if validlink %}
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100">Change Password</button>
        </form>
    {% else %}
        <div class="alert alert-danger text-center">
            <p class="mb-0">This password reset link is invalid or has already been used.</p>
        </div>
        <div class="text-center mt-3">
            <a href="{% url 'password_reset' %}" class="btn btn-outline-primary">Request a new link</a>
        </div>
    {% endif %}
</div>
{% endblock %}
